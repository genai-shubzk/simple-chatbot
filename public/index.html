<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaTech Policy Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }

    .brand h1 { font-size: 1rem; font-weight: 600; }
    .brand p  { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    /* Toggle */
    .rag-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--muted);
      user-select: none;
    }

    .switch { position: relative; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .track {
      position: absolute; inset: 0;
      background: #cbd5e1; border-radius: 11px; cursor: pointer;
      transition: background .2s;
    }
    .track::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: white; border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked ~ .track { background: var(--primary); }
    .switch input:checked ~ .track::before { transform: translateX(18px); }

    /* ── Chat area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .inner {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    /* Empty state */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
      color: var(--muted);
      padding: 40px 16px;
    }
    #empty .icon { font-size: 2.5rem; }
    #empty h2 { font-size: 1.1rem; color: var(--text); font-weight: 600; }
    #empty p  { font-size: 0.85rem; max-width: 300px; }

    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 12px;
    }
    .chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      transition: border-color .15s, color .15s, background .15s;
    }
    .chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #eff6ff;
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 10px;
      animation: pop .18s ease;
    }
    .msg.user { flex-direction: row-reverse; }

    @keyframes pop {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 0.75rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .user .avatar     { background: var(--primary); color: white; }
    .assistant .avatar { background: #e2e8f0; color: var(--text); }

    .bubble {
      max-width: 75%;
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      line-height: 1.65;
    }
    .user .bubble {
      background: var(--primary); color: white;
      border-bottom-right-radius: 3px;
    }
    .assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    /* Sources */
    .sources {
      display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px;
    }
    .src {
      font-size: 0.7rem; padding: 2px 9px;
      background: #dbeafe; color: #1e40af;
      border-radius: 20px;
    }

    /* Loading dots */
    .dots {
      display: flex; gap: 5px; padding: 3px 0;
    }
    .dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.1s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .18s; }
    .dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    .inputbar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      flex-shrink: 0;
    }

    .inputrow {
      max-width: 720px; margin: 0 auto;
      display: flex; gap: 10px; align-items: flex-end;
    }

    textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-family: inherit;
      resize: none;
      height: 44px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--primary); }

    button#send {
      height: 44px; padding: 0 20px;
      background: var(--primary); color: white;
      border: none; border-radius: var(--radius);
      font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: background .2s;
      flex-shrink: 0;
    }
    button#send:hover    { background: var(--primary-hover); }
    button#send:disabled { background: #93c5fd; cursor: not-allowed; }

    @media (max-width: 480px) {
      header { padding: 12px 16px; }
      .bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1>📋 NovaTech Policy Assistant</h1>
    <p>Ask about HR, IT &amp; Finance policies</p>
  </div>
  <div class="rag-toggle">
    <span>RAG</span>
    <label class="switch">
      <input type="checkbox" id="ragToggle" checked />
      <span class="track"></span>
    </label>
  </div>
</header>

<div id="messages">
  <div id="empty">
    <div class="icon">💬</div>
    <h2>How can I help you?</h2>
    <p>Ask anything about NovaTech's policies.</p>
    <div class="chips">
      <button class="chip" onclick="send('How many earned leave days do I get per year?')">Earned leave days?</button>
      <button class="chip" onclick="send('What is the minimum password length?')">Password requirements?</button>
      <button class="chip" onclick="send('What is the daily hotel limit for Tier 1 cities?')">Travel hotel limit?</button>
      <button class="chip" onclick="send('What is the notice period for a Band 5 employee?')">Notice period Band 5?</button>
      <button class="chip" onclick="send('How do I report a cybersecurity incident?')">Report security incident?</button>
    </div>
  </div>
</div>

<div class="inputbar">
  <div class="inputrow">
    <textarea id="input" placeholder="Ask about NovaTech policies…" rows="1"></textarea>
    <button id="send" onclick="send()">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const emptyEl    = document.getElementById("empty");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send");
  const ragToggle  = document.getElementById("ragToggle");
  let busy = false;

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "44px";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function send(text) {
    const q = (text ?? inputEl.value).trim();
    if (!q || busy) return;

    // Clear suggestion chips if first message
    if (emptyEl) emptyEl.remove();

    appendMsg("user", q);
    inputEl.value = "";
    inputEl.style.height = "44px";

    const loadingBubble = appendMsg("assistant", null);
    busy = true;
    sendBtn.disabled = true;

    fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, use_rag: ragToggle.checked }),
    })
      .then(r => r.json())
      .then(data => {
        loadingBubble.remove();
        if (data.error) {
          appendMsg("assistant", "⚠️ " + data.error);
        } else {
          appendMsg("assistant", data.answer, data.sources || []);
        }
      })
      .catch(() => {
        loadingBubble.remove();
        appendMsg("assistant", "⚠️ Could not reach the server. Please try again.");
      })
      .finally(() => {
        busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      });
  }

  function appendMsg(role, text, sources = []) {
    const wrap   = document.createElement("div");
    wrap.className = "inner";

    const msg    = document.createElement("div");
    msg.className = "msg " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "You" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (text === null) {
      bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    } else {
      bubble.textContent = text;

      if (sources.length) {
        const row = document.createElement("div");
        row.className = "sources";
        sources.forEach(s => {
          const chip = document.createElement("span");
          chip.className = "src";
          chip.textContent = "📄 " + s;
          row.appendChild(chip);
        });
        bubble.appendChild(row);
      }
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    wrap.appendChild(msg);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }
</script>
</body>
</html>
